<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="flNode" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="flLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#flBg)"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="48" rx="16" fill="#0f0f23" opacity="0.6"/>
  <rect x="0" y="40" width="800" height="8" fill="#0f0f23" opacity="0.6"/>
  <circle cx="24" cy="24" r="5" fill="#3b82f6"/>
  <circle cx="44" cy="24" r="5" fill="#60a5fa"/>
  <circle cx="64" cy="24" r="5" fill="#4facfe"/>
  <rect x="320" y="16" width="160" height="16" rx="8" fill="#ffffff" opacity="0.1"/>
  <!-- Toolbar -->
  <rect x="0" y="48" width="800" height="44" fill="#0f0f23" opacity="0.4"/>
  <rect x="24" y="60" width="80" height="20" rx="6" fill="#3b82f6" opacity="0.3"/>
  <text x="40" y="74" font-family="Segoe UI, sans-serif" font-size="10" fill="#a8b2d1">开始节点</text>
  <rect x="112" y="60" width="80" height="20" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="128" y="74" font-family="Segoe UI, sans-serif" font-size="10" fill="#a8b2d1">服务任务</text>
  <rect x="200" y="60" width="80" height="20" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="216" y="74" font-family="Segoe UI, sans-serif" font-size="10" fill="#a8b2d1">网关</text>
  <rect x="288" y="60" width="80" height="20" rx="6" fill="#ffffff" opacity="0.08"/>
  <text x="304" y="74" font-family="Segoe UI, sans-serif" font-size="10" fill="#a8b2d1">调用活动</text>
  <rect x="376" y="60" width="80" height="20" rx="6" fill="#60a5fa" opacity="0.25"/>
  <text x="392" y="74" font-family="Segoe UI, sans-serif" font-size="10" fill="#a8b2d1">结束节点</text>
  <!-- Grid dots -->
  <g fill="#ffffff" opacity="0.06">
    <circle cx="120" cy="140" r="1.5"/><circle cx="160" cy="140" r="1.5"/><circle cx="200" cy="140" r="1.5"/><circle cx="240" cy="140" r="1.5"/><circle cx="280" cy="140" r="1.5"/><circle cx="320" cy="140" r="1.5"/><circle cx="360" cy="140" r="1.5"/><circle cx="400" cy="140" r="1.5"/><circle cx="440" cy="140" r="1.5"/><circle cx="480" cy="140" r="1.5"/><circle cx="520" cy="140" r="1.5"/><circle cx="560" cy="140" r="1.5"/><circle cx="600" cy="140" r="1.5"/><circle cx="640" cy="140" r="1.5"/><circle cx="680" cy="140" r="1.5"/><circle cx="720" cy="140" r="1.5"/>
    <circle cx="120" cy="180" r="1.5"/><circle cx="160" cy="180" r="1.5"/><circle cx="200" cy="180" r="1.5"/><circle cx="240" cy="180" r="1.5"/><circle cx="280" cy="180" r="1.5"/><circle cx="320" cy="180" r="1.5"/><circle cx="360" cy="180" r="1.5"/><circle cx="400" cy="180" r="1.5"/><circle cx="440" cy="180" r="1.5"/><circle cx="480" cy="180" r="1.5"/><circle cx="520" cy="180" r="1.5"/><circle cx="560" cy="180" r="1.5"/><circle cx="600" cy="180" r="1.5"/><circle cx="640" cy="180" r="1.5"/><circle cx="680" cy="180" r="1.5"/><circle cx="720" cy="180" r="1.5"/>
    <circle cx="120" cy="260" r="1.5"/><circle cx="160" cy="260" r="1.5"/><circle cx="200" cy="260" r="1.5"/><circle cx="240" cy="260" r="1.5"/><circle cx="280" cy="260" r="1.5"/><circle cx="320" cy="260" r="1.5"/><circle cx="360" cy="260" r="1.5"/><circle cx="400" cy="260" r="1.5"/><circle cx="440" cy="260" r="1.5"/><circle cx="480" cy="260" r="1.5"/><circle cx="520" cy="260" r="1.5"/><circle cx="560" cy="260" r="1.5"/><circle cx="600" cy="260" r="1.5"/><circle cx="640" cy="260" r="1.5"/><circle cx="680" cy="260" r="1.5"/><circle cx="720" cy="260" r="1.5"/>
    <circle cx="120" cy="340" r="1.5"/><circle cx="160" cy="340" r="1.5"/><circle cx="200" cy="340" r="1.5"/><circle cx="240" cy="340" r="1.5"/><circle cx="280" cy="340" r="1.5"/><circle cx="320" cy="340" r="1.5"/><circle cx="360" cy="340" r="1.5"/><circle cx="400" cy="340" r="1.5"/><circle cx="440" cy="340" r="1.5"/><circle cx="480" cy="340" r="1.5"/><circle cx="520" cy="340" r="1.5"/><circle cx="560" cy="340" r="1.5"/><circle cx="600" cy="340" r="1.5"/><circle cx="640" cy="340" r="1.5"/><circle cx="680" cy="340" r="1.5"/><circle cx="720" cy="340" r="1.5"/>
  </g>
  <!-- Connections -->
  <path d="M 200 220 L 290 220" stroke="url(#flLine)" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 410 220 L 500 220" stroke="url(#flLine)" stroke-width="2.5" fill="none"/>
  <path d="M 620 220 L 710 220" stroke="url(#flLine)" stroke-width="2.5" fill="none"/>
  <path d="M 560 260 L 560 340 L 420 340" stroke="url(#flLine)" stroke-width="2.5" stroke-dasharray="5 4" fill="none"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <!-- Start node -->
  <circle cx="160" cy="220" r="32" fill="url(#flNode)"/>
  <text x="160" y="224" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">开始</text>
  <!-- Service task node -->
  <rect x="290" y="188" width="120" height="64" rx="10" fill="#0f0f23" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="290" y="188" width="120" height="20" rx="10" fill="url(#flNode)" opacity="0.3"/>
  <text x="350" y="202" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#a8b2d1">服务任务</text>
  <text x="350" y="226" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">校验数据</text>
  <text x="350" y="242" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#8892b0">validateData()</text>
  <!-- Gateway (diamond) -->
  <polygon points="560,180 620,220 560,260 500,220" fill="#0f0f23" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="560" y="224" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" fill="#60a5fa">✕</text>
  <!-- End node -->
  <circle cx="742" cy="220" r="28" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="742" cy="220" r="20" fill="#3b82f6" opacity="0.3"/>
  <text x="742" y="224" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#fff">结束</text>
  <!-- Branch node -->
  <rect x="300" y="316" width="120" height="48" rx="10" fill="#0f0f23" stroke="#4facfe" stroke-width="1.5"/>
  <rect x="300" y="316" width="120" height="16" rx="10" fill="#4facfe" opacity="0.25"/>
  <text x="360" y="328" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#a8b2d1">调用活动</text>
  <text x="360" y="350" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#fff">发送通知</text>
  <!-- Labels -->
  <text x="540" y="208" font-family="Segoe UI, sans-serif" font-size="9" fill="#22c55e">是</text>
  <text x="540" y="296" font-family="Segoe UI, sans-serif" font-size="9" fill="#3b82f6">否</text>
</svg>
