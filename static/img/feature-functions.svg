  <text x="236" y="226" fill="#e2e8f0" font-size="11" font-family="monospace">}</text>

  <text x="214" y="252" fill="#64748b" font-size="11" font-family="monospace">9</text>
  <text x="236" y="252" fill="#e2e8f0" font-size="11" font-family="monospace"/>

  <text x="214" y="272" fill="#64748b" font-size="11" font-family="monospace">10</text>
  <text x="239" y="272" fill="#cbd5e1" font-size="11" font-family="monospace">// Deploy with: fn deploy prod</text>

