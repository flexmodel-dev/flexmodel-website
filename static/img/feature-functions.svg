  <text x="236" y="94" fill="#93c5fd" font-size="11" font-family="monospace">import</text>
  <text x="276" y="94" fill="#e2e8f0" font-size="11" font-family="monospace">{ db }</text>
  <text x="334" y="94" fill="#93c5fd" font-size="11" font-family="monospace"> from</text>
  <text x="366" y="94" fill="#4ade80" font-size="11" font-family="monospace"> "flexmodel"</text>

