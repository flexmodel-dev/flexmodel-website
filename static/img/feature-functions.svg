  <text x="358" y="160" fill="#93c5fd" font-size="11" font-family="monospace"> await</text>
  <text x="400" y="160" fill="#e2e8f0" font-size="11" font-family="monospace"> db.</text>
  <text x="428" y="160" fill="#facc15" font-size="11" font-family="monospace">query</text>
  <text x="472" y="160" fill="#e2e8f0" font-size="11" font-family="monospace">(</text>

  <text x="214" y="180" fill="#64748b" font-size="11" font-family="monospace">6</text>
  <text x="260" y="180" fill="#4ade80" font-size="11" font-family="monospace">"SELECT * FROM o</text>
  <text x="484" y="180" fill="#e2e8f0" font-size="11" font-family="monospace">)</text>

  <text x="214" y="206" fill="#64748b" font-size="11" font-family="monospace">7</text>
  <text x="248" y="206" fill="#93c5fd" font-size="11" font-family="monospace">return</text>
  <text x="296" y="206" fill="#e2e8f0" font-size="11" font-family="monospace"> Response.</text>
  <text x="368" y="206" fill="#cbd5e1" font-size="11" font-family="monospace">json</text>

