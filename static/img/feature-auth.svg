    <text x="213" y="441">OIDC</text>
    <rect x="278" y="424" width="70" height="26" rx="13" fill="#667eea" opacity="0.25"/>
    <text x="298" y="441">LDAP</text>
    <rect x="356" y="424" width="80" height="26" rx="13" fill="#764ba2" opacity="0.3"/>
    <text x="372" y="441">社交账号</text>
    <rect x="444" y="424" width="60" height="26" rx="13" fill="#4facfe" opacity="0.3"/>
    <text x="460" y="441">JWT</text>
    <rect x="512" y="424" width="90" height="26" rx="13" fill="#f093fb" opacity="0.25"/>
    <text x="528" y="441">多租户</text>
