  <text x="254" y="166" font-family="Segoe UI, sans-serif" font-size="9" fill="#a8b2d1">全部权限</text>
  <text x="254" y="184" font-family="Segoe UI, sans-serif" font-size="9" fill="#22c55e">● 12 用户</text>
  <rect x="394" y="120" width="180" height="80" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
