    <text x="416" y="278" fill="#22c55e">✓ CRUD</text>
    <text x="516" y="278" fill="#22c55e">✓ CRU</text>
    <text x="616" y="278" fill="#4facfe">✓ R</text>
    <text x="216" y="306">order.*</text>
    <text x="416" y="306" fill="#22c55e">✓ CRUD</text>
    <text x="516" y="306" fill="#22c55e">✓ CRU</text>
    <text x="616" y="306" fill="#64748b">—</text>
    <text x="216" y="334">system.config</text>
    <text x="416" y="334" fill="#22c55e">✓ CRUD</text>
    <text x="516" y="334" fill="#64748b">—</text>
    <text x="616" y="334" fill="#64748b">—</text>
    <text x="216" y="362">audit.log</text>
    <text x="416" y="362" fill="#22c55e">✓ R</text>
    <text x="516" y="362" fill="#64748b">—</text>
    <text x="616" y="362" fill="#64748b">—</text>
  </g>
  <line x1="200" y1="378" x2="770" y2="378" stroke="#ffffff" stroke-opacity="0.08"/>
  <!-- Auth providers -->
  <text x="200" y="408" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#a8b2d1">身份提供商</text>
