  <text x="422" y="156" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#fff">编</text>
  <text x="448" y="148" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">编辑者</text>
  <text x="448" y="166" font-family="Segoe UI, sans-serif" font-size="9" fill="#a8b2d1">读写权限</text>
  <text x="448" y="184" font-family="Segoe UI, sans-serif" font-size="9" fill="#f093fb">● 38 用户</text>
  <rect x="588" y="120" width="180" height="80" rx="12" fill="#ffffff" opacity="0.05" stroke="#ffffff" stroke-opacity="0.1"/>
  <circle cx="616" cy="152" r="16" fill="#4facfe" opacity="0.5"/>
  <text x="616" y="156" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#fff">访</text>
  <text x="642" y="148" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">访客</text>
